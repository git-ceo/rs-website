<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <title>管理后台 · 荣盛科技</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23004182'/><text x='50' y='68' font-size='60' text-anchor='middle' fill='%23fff' font-family='serif' font-weight='bold'>荣</text></svg>">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="login-shell">
        <main class="login-card">
            <div class="login-brand">
                <div class="mark">荣</div>
                <div>
                    <div class="name">绵阳市荣盛科技有限公司</div>
                    <div class="sub">RONGSHENG · TECH</div>
                </div>
            </div>

            <h1 class="login-title">管理后台</h1>
            <p class="login-subtitle">CONSOLE</p>

            <form class="login-form" id="login-form" onsubmit="handleLogin(event)" autocomplete="off">
                <div class="field">
                    <label>
                        <span>用户名 / Username</span>
                        <span class="idx">/01</span>
                    </label>
                    <input type="text" id="login-username" autocomplete="username" placeholder="请输入用户名" required>
                </div>

                <div class="field">
                    <label>
                        <span>密码 / Password</span>
                        <span class="idx">/02</span>
                    </label>
                    <input type="password" id="login-password" autocomplete="current-password" placeholder="请输入密码" required>
                </div>

                <div class="login-error" id="login-error"></div>

                <button type="submit" class="btn-login" id="login-btn">
                    <span>进 入 控 制 台</span>
                </button>
            </form>

            <div class="login-footer">
                © 1993—2026 / SECURE ACCESS · v1.0
            </div>
        </main>
    </div>

    <script src="admin.js"></script>
    <script>
        // 已登录则直接跳转
        if (getToken()) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
