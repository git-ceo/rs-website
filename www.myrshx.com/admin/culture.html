<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <title>企业文化管理 · 荣盛科技后台</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23004182'/><text x='50' y='68' font-size='60' text-anchor='middle' fill='%23fff' font-family='serif' font-weight='bold'>荣</text></svg>">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="admin-layout">
        <main class="main">
            <header class="page-head">
                <div>
                    <div class="page-eyebrow"><span class="num">/ 07</span><span>CORPORATE CULTURE</span></div>
                    <h1 class="page-title">企业文化管理</h1>
                    <p class="page-subtitle">管理活动照片 · 特色菜 / 生日会 / 旅游 / 年会 / 拓展 / 公益</p>
                </div>
                <button class="btn btn-primary" id="btn-new-culture">
                    <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                    新增照片
                </button>
            </header>

            <!-- 分类切换 -->
            <div class="tab-bar" id="culture-tabs">
                <button class="tab active" data-cat="all">全部</button>
                <button class="tab" data-cat="cooking">🍳 特色菜</button>
                <button class="tab" data-cat="birthday">🎂 生日会</button>
                <button class="tab" data-cat="travel">✈️ 旅游</button>
                <button class="tab" data-cat="gala">🎉 年会</button>
                <button class="tab" data-cat="outdoor">🏕️ 拓展</button>
                <button class="tab" data-cat="charity">💝 公益</button>
            </div>

            <div class="carousel-grid" id="culture-grid">
                <div class="page-loading" style="grid-column:1/-1;">
                    <div class="loading dark"></div>
                    <div>加载中...</div>
                </div>
            </div>
        </main>
    </div>

    <!-- 新增弹窗 -->
    <div class="modal" id="culture-modal">
        <div class="modal-mask"></div>
        <div class="modal-body lg">
            <div class="modal-head">
                <div class="t">
                    <span class="eyebrow">CULTURE · EDITOR</span>
                    <span id="culture-modal-title">新增活动照片</span>
                </div>
                <button class="modal-close" onclick="closeModal('culture-modal')">×</button>
            </div>
            <form id="culture-form">
                <div class="modal-content">
                    <input type="hidden" id="culture-image">

                    <div class="form-grid">
                        <div class="field full">
                            <label><span>活动照片 *</span><span class="hint">/ IMAGE</span></label>
                            <div class="upload-box" id="culture-upload"></div>
                        </div>

                        <div class="field">
                            <label><span>标题 *</span><span class="hint">/ TITLE</span></label>
                            <input type="text" id="culture-title" required placeholder="例如：2023年员工美食厨艺交流">
                        </div>

                        <div class="field">
                            <label><span>分类 *</span><span class="hint">/ CATEGORY</span></label>
                            <select id="culture-category" required>
                                <option value="cooking">🍳 特色菜分享</option>
                                <option value="birthday">🎂 员工生日会</option>
                                <option value="travel">✈️ 公司旅游</option>
                                <option value="gala">🎉 年会盛典</option>
                                <option value="outdoor">🏕️ 户外拓展</option>
                                <option value="charity">💝 公益活动</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-foot">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('culture-modal')">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script src="admin.js"></script>
    <script>
        if (checkAuth()) {
            renderSidebar('culture');
            initCulture();
        }
    </script>
</body>
</html>
