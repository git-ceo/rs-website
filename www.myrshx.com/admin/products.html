<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <title>产品管理 · 荣盛科技后台</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23004182'/><text x='50' y='68' font-size='60' text-anchor='middle' fill='%23fff' font-family='serif' font-weight='bold'>荣</text></svg>">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="admin-layout">
        <main class="main">
            <header class="page-head">
                <div>
                    <div class="page-eyebrow"><span class="num">/ 04</span><span>PRODUCTS · BUSINESS</span></div>
                    <h1 class="page-title">产品管理</h1>
                    <p class="page-subtitle">主营业务 5 项 · 代理品牌矩阵</p>
                </div>
            </header>

            <!-- 产品卡片 -->
            <h2 style="font-family:var(--f-display); font-weight:700; font-size:18px; color:var(--c-ink); margin-bottom:16px; display:flex; align-items:center; gap:10px;">
                主营业务
                <span style="font-family:var(--f-mono); font-size:11px; color:var(--c-gold); letter-spacing:.2em;">/ 5 ITEMS</span>
            </h2>
            <div class="prod-grid" id="product-grid">
                <div class="page-loading" style="grid-column:1/-1;">
                    <div class="loading dark"></div>
                    <div>加载中...</div>
                </div>
            </div>

            <!-- 品牌管理 -->
            <section class="brand-section">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                    <h2 style="font-family:var(--f-display); font-weight:700; font-size:18px; color:var(--c-ink); display:flex; align-items:center; gap:10px;">
                        代理品牌矩阵
                        <span style="font-family:var(--f-mono); font-size:11px; color:var(--c-gold); letter-spacing:.2em;">/ BRANDS</span>
                    </h2>
                    <button class="btn btn-primary" id="btn-save-brands">保存品牌列表</button>
                </div>
                <p style="color:var(--c-muted); font-size:13px; margin-bottom:18px;">在每个分类下输入品牌名称后回车添加，点击 × 删除。修改完成后请点击右上角"保存品牌列表"。</p>
                <div id="brand-wrap"></div>
            </section>
        </main>
    </div>

    <!-- 产品编辑弹窗 -->
    <div class="modal" id="product-modal">
        <div class="modal-mask"></div>
        <div class="modal-body lg">
            <div class="modal-head">
                <div class="t">
                    <span class="eyebrow">PRODUCT · EDITOR</span>
                    <span id="product-modal-title">编辑产品</span>
                </div>
                <button class="modal-close" onclick="closeModal('product-modal')">×</button>
            </div>
            <form id="product-form">
                <div class="modal-content">
                    <input type="hidden" id="product-id">
                    <input type="hidden" id="product-image">

                    <div class="form-grid">
                        <div class="field full">
                            <label><span>产品图片</span><span class="hint">/ IMAGE</span></label>
                            <div class="upload-box" id="product-upload"></div>
                        </div>

                        <div class="field full">
                            <label><span>产品标题 *</span><span class="hint">/ TITLE</span></label>
                            <input type="text" id="product-title" required placeholder="产品/业务名称">
                        </div>

                        <div class="field full">
                            <label><span>详细描述</span><span class="hint">/ DESCRIPTION</span></label>
                            <textarea id="product-description" placeholder="详细介绍产品/业务..."></textarea>
                        </div>

                        <div class="field full">
                            <label><span>特色亮点</span><span class="hint">/ FEATURES · 4 项</span></label>
                            <div class="feat-inputs">
                                <input type="text" id="product-feat-0" placeholder="亮点 1">
                                <input type="text" id="product-feat-1" placeholder="亮点 2">
                                <input type="text" id="product-feat-2" placeholder="亮点 3">
                                <input type="text" id="product-feat-3" placeholder="亮点 4">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-foot">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('product-modal')">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script src="admin.js"></script>
    <script>
        if (checkAuth()) {
            renderSidebar('products');
            initProducts();
        }
    </script>
</body>
</html>
