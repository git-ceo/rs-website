          - paragraph [ref=e84]: 绵阳市荣盛科技有限公司成立于1993年，是一家专注于智能实验室配套产品以及实验室建设的企业。公司现经营场所面积1600平方米，主营业务涵盖化验室及净化室装修工程、试剂耗材销售、危险化学品仓储与运输服务、实验室仪器设备销售、排风系统及废气处理系统以及化工原料销售六大板块。
